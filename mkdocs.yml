site_name: CogMem Docs
site_description: Architecture, Configuration, and Per-File Tutorials for CogMem
site_url: https://triet4p.github.io/agent-memory-cognitive/
repo_url: https://github.com/triet4p/agent-memory-cognitive
edit_uri: edit/master/

docs_dir: tutorials
site_dir: site
use_directory_urls: true

nav:
  - Quickstart: QUICKSTART.md
  - Learning Path: LEARNING-PATH.md
  - Tutorials Index: INDEX.md
  - Architecture:
      - Overview: ARCHITECTURE/overview.md
      - Retain Pipeline: ARCHITECTURE/retain-pipeline.md
      - Search Pipeline: ARCHITECTURE/search-pipeline.md
      - Reflect Pipeline: ARCHITECTURE/reflect-pipeline.md
  - Configuration:
      - Environment Variables: CONFIG/env-vars.md
      - Extraction Prompts: CONFIG/prompts.md
      - Running CogMem: CONFIG/running.md
  - Per-File Guides:
      - PER-FILE/config.md
      - PER-FILE/retain-fact-extraction.md
      - PER-FILE/retain-orchestrator.md
      - PER-FILE/retain-chunking.md
      - PER-FILE/retain-dedup.md
  - Reference:
      - Troubleshooting: REFERENCE/troubleshooting.md
  - Code Reading (Preserved):
      - Manual Code Reading Guide: manual-code-reading-guide.md
  - Flows:
      - Retain → Recall → Reflect → Response: flows/retain-recall-reflect-response.md

theme:
  name: material
  language: en
  features:
    - navigation.top
    - navigation.sections
    - navigation.expand
    - content.code.copy

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html

plugins:
  - search
  - include-markdown

validation:
  nav:
    omitted_files: ignore
  links:
    not_found: ignore
