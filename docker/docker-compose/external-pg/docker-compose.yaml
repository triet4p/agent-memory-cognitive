# Docker Compose for CogMem with external PostgreSQL (pgvector image)
# Usage: docker compose --env-file .env -f docker/docker-compose/external-pg/docker-compose.yaml up --build

services:
  db:
    image: ${COGMEM_DB_IMAGE:-pgvector/pgvector:pg18}
    container_name: cogmem-db
    restart: always
    environment:
      POSTGRES_USER: ${COGMEM_DB_USER:-cogmem_user}
      POSTGRES_PASSWORD: ${COGMEM_DB_PASSWORD:?Please set COGMEM_DB_PASSWORD in your .env}
      POSTGRES_DB: ${COGMEM_DB_NAME:-cogmem_db}
    volumes:
      - pg_data:/var/lib/postgresql
    networks:
      - cogmem-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${COGMEM_DB_USER:-cogmem_user} -d ${COGMEM_DB_NAME:-cogmem_db}"]
      interval: 5s
      timeout: 5s
      retries: 20

  cogmem:
    build:
      context: ../../..
      dockerfile: docker/standalone/Dockerfile
      args:
        INCLUDE_LOCAL_MODELS: ${COGMEM_DOCKER_INCLUDE_LOCAL_MODELS:-true}
        TORCH_CPU_VERSION: ${COGMEM_DOCKER_TORCH_CPU_VERSION:-2.11.0}
        ST_VERSION: ${COGMEM_DOCKER_ST_VERSION:-5.3.0}
    image: cogmem:local
    container_name: cogmem-app
    restart: always
    env_file:
      - ../../../.env
    ports:
      - "${COGMEM_API_PORT:-8888}:${COGMEM_API_PORT:-8888}"
    environment:
      COGMEM_API_DATABASE_URL: postgresql://${COGMEM_DB_USER:-cogmem_user}:${COGMEM_DB_PASSWORD:?Please set COGMEM_DB_PASSWORD in your .env}@db:5432/${COGMEM_DB_NAME:-cogmem_db}
      COGMEM_API_HOST: ${COGMEM_API_HOST:-0.0.0.0}
      COGMEM_API_PORT: ${COGMEM_API_PORT:-8888}
      COGMEM_API_LOG_LEVEL: ${COGMEM_API_LOG_LEVEL:-info}
      COGMEM_WAIT_FOR_DEPS: true
      PRELOAD_ML_MODELS: ${PRELOAD_ML_MODELS:-false}
      HF_TOKEN: ${HF_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cogmem-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/health > /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20

networks:
  cogmem-net:
    driver: bridge

volumes:
  pg_data:
